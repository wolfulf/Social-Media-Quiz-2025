<!DOCTYPE html>
<html lang="de">
<head>

  <style>

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      max-width: 660px;
      width: 100%;
      padding: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }
    .header { margin-bottom: 28px; }
    .tag {
      display: inline-block;
      background: #1A1A2E;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;

      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .progress-bar { height: 6px; background: #ebebeb; border-radius: 99px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #E63946, #457B9D);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .question-num {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #E63946;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 18px;
      font-weight: 700;
      color: #1A1A2E;
      line-height: 1.45;
      margin-bottom: 28px;
    }
    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 2px solid #ebebeb;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
      color: #1A1A2E;
      font-weight: 500;
      background: #fff;
    }
    .option:hover:not(.disabled) { border-color: #457B9D; background: #f0f6fb; }
    .option .opt-letter {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f4f4f8;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #888;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .option.selected { border-color: #457B9D; background: #eef5fb; }
    .option.selected .opt-letter { background: #457B9D; color: #fff; }
    .option.correct { border-color: #2A9D8F; background: #edfaf7; }
    .option.correct .opt-letter { background: #2A9D8F; color: #fff; }
    .option.wrong { border-color: #E63946; background: #fdf0f1; }
    .option.wrong .opt-letter { background: #E63946; color: #fff; }
    .option.disabled { cursor: default; }
    .free-input-wrap { margin-bottom: 24px; }
    .free-input-wrap input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #ebebeb;
      border-radius: 12px;
      font-size: 15px;
      color: #1A1A2E;
      outline: none;
      transition: border-color 0.2s;
    }
    .free-input-wrap input:focus { border-color: #457B9D; }
    .free-input-wrap input.correct-input { border-color: #2A9D8F; background: #edfaf7; }
    .free-input-wrap input.wrong-input   { border-color: #E63946; background: #fdf0f1; }
    .feedback {
      display: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .feedback.correct-fb { background: #edfaf7; color: #1e7a6d; border-left: 4px solid #2A9D8F; }
    .feedback.wrong-fb   { background: #fdf0f1; color: #b52733; border-left: 4px solid #E63946; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover { background: #2d2d50; }
    .btn-primary:disabled { background: #ccc; cursor: default; }
    .results { display: none; }
    .score-circle {

      border-radius: 50%;
      background: linear-gradient(135deg, #E63946, #457B9D);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff;

    .results h2 { text-align: center; font-size: 20px; color: #1A1A2E; margin-bottom: 6px; }
    .results .results-sub { text-align: center; color: #999; font-size: 13px; margin-bottom: 28px; }
    .result-list { display: flex; flex-direction: column; gap: 10px; }
    .result-item {

      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;

    .result-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .result-q { font-weight: 700; color: #1A1A2E; margin-bottom: 3px; }
    .result-a { color: #555; }
    .result-a span { font-weight: 700; }
    .btn-restart { background: #1A1A2E; color: #fff; width: 100%; margin-top: 24px; text-align: center; }

const TOTAL = 10;
let sessionQuestions = [];
let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let selectedIndex = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickQuestions() {
  const pool = shuffle([...ALL_QUESTIONS]);
  return pool.slice(0, TOTAL);
}

  const q = sessionQuestions[current];
  answered = false;
  selectedIndex = null;

    freeWrap.style.display = 'none';
    // shuffle options while tracking correct answer
    const indices = shuffle([0,1,2,3]);
    const correctLabel = q.options[q.correct];
    const shuffledOpts = indices.map(i => q.options[i]);
    const newCorrect = shuffledOpts.indexOf(correctLabel);
    const letters = ['A','B','C','D'];
    shuffledOpts.forEach((opt, i) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<div class="opt-letter">${letters[i]}</div><span>${opt}</span>`;
      div.addEventListener('click', () => {
        if (answered) return;
        selectedIndex = i;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        div.classList.add('selected');
        btn.disabled = false;
      });
      optWrap.appendChild(div);
    });
    // store shuffled correct index on q temporarily
    q._shuffledCorrect = newCorrect;
    q._shuffledOpts = shuffledOpts;
  } else {
    optWrap.style.display = 'none';
    freeWrap.style.display = 'block';
    freeInput.value = '';
    freeInput.className = '';
    freeInput.disabled = false;
    freeInput.oninput = () => { btn.disabled = freeInput.value.trim() === ''; };
  }
}

document.getElementById('action-btn').addEventListener('click', () => {
  if (answered) {
    current++;
    if (current < TOTAL) renderQuestion();
    else showResults();
    return;
  }

  const q = sessionQuestions[current];
  answered = true;
  let isCorrect = false;

  if (q.type === 'mc') {
    isCorrect = selectedIndex === q._shuffledCorrect;
    document.querySelectorAll('.option').forEach((el, i) => {
      el.classList.add('disabled');
      if (i === q._shuffledCorrect) el.classList.add('correct');
      else if (i === selectedIndex) el.classList.add('wrong');
    });
    userAnswers.push({
      question: q.text,
      userAnswer: q._shuffledOpts[selectedIndex],
      correctAnswer: q._shuffledOpts[q._shuffledCorrect],
      correct: isCorrect
    });
  } else {
    const val = parseFloat(document.getElementById('free-input').value);
    isCorrect = Math.abs(val - q.correct) <= q.tolerance;
    const inp = document.getElementById('free-input');
    inp.disabled = true;
    inp.className = isCorrect ? 'correct-input' : 'wrong-input';
    userAnswers.push({
      question: q.text,
      userAnswer: val + ' %',
      correctAnswer: q.correct + ' %',
      correct: isCorrect
    });
  }

  if (isCorrect) score++;

  const feedback = document.getElementById('feedback');
  feedback.style.display = 'block';
  feedback.className = isCorrect ? 'feedback correct-fb' : 'feedback wrong-fb';
  feedback.innerHTML = isCorrect ? `✅ Richtig! ${q.explanation}` : `❌ Leider falsch. ${q.explanation}`;

  document.getElementById('q-score-live').textContent = `${score} richtig`;
  const btn = document.getElementById('action-btn');
  btn.disabled = false;
  btn.textContent = current < TOTAL - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen →';
});

function showResults() {
  document.getElementById('quiz-view').style.display = 'none';
  const rv = document.getElementById('results-view');
  rv.style.display = 'block';
  document.getElementById('final-score').textContent = score;

  let heading, sub;
  if (score >= 9)      { heading = '🏆 Hervorragend!'; sub = 'Du kennst die ARD/ZDF-Medienstudie 2025 wie dein eigenes Wohnzimmer.'; }
  else if (score >= 7) { heading = '🎉 Sehr gut!'; sub = 'Starkes Ergebnis – du hast die Zahlen wirklich drauf.'; }
  else if (score >= 5) { heading = '👍 Solide!'; sub = 'Gutes Grundwissen – ein paar Zahlen noch verinnerlichen.'; }
  else                 { heading = '📚 Noch Luft nach oben.'; sub = 'Lies die Studie nochmal – dann klappt\'s beim nächsten Mal besser!'; }

  document.getElementById('result-heading').textContent = heading;
  document.getElementById('result-sub').textContent = sub;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  userAnswers.forEach(a => {
    const div = document.createElement('div');
    div.className = `result-item ${a.correct ? 'r-correct' : 'r-wrong'}`;
    div.innerHTML = `
      <div class="result-icon">${a.correct ? '✅' : '❌'}</div>
      <div>
        <div class="result-q">${a.question}</div>
        <div class="result-a">Deine Antwort: <span>${a.userAnswer}</span>${!a.correct ? ` · Richtig: <span>${a.correctAnswer}</span>` : ''}</div>
      </div>`;
    list.appendChild(div);
  });
}

function restartQuiz() {
  current = 0; score = 0; userAnswers = []; selectedIndex = null;
  sessionQuestions = pickQuestions();
  document.getElementById('results-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  renderQuestion();
}

// Init
sessionQuestions = pickQuestions();
renderQuestion();
</script>
